<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interaction Metrics Survey Bias Checker</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&family=Nunito+Sans&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito Sans', sans-serif;
            text-align: left;
            padding: 20px;
            background-color: #ffffff;
        }
        .card {
    background: white;
    padding: 10px;
    border-radius: 5px;
    box-shadow: 0px 2px 5px rgba(0, 0, 0, 0.1);
    margin-bottom: 10px;
    width: 100%; /* full width */
    box-sizing: border-box; /* ensures padding doesn't overflow */
}
        h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 20px;
        }
        label {
            font-size: 14px;
            font-weight: bold;
        }
        textarea, select, input {
            width: 100%;
            margin: 5px 0;
            padding: 5px;
            border-radius: 3px;
            border: 1px solid #ccc;
            outline: none;
            transition: all 0.3s;
        }
        textarea, select, input {
    width: 100%;
    margin: 5px 0;
    padding: 10px; /* increased from 5px to 10px */
    border-radius: 3px;
    border: 1px solid #ccc;
    outline: none;
    transition: all 0.3s;
    box-sizing: border-box; /* ensures padding doesn't overflow */
}
        .button {
            width: 100%;
            padding: 8px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 14px;
            color: white;
            background: #00153E;
            transition: background 0.3s;
            text-align: center;
        }
        .button:hover {
            background: #003A70;
        }
        .remove-option {
            background: white;
            color: black;
            padding: 5px 8px;
            border: 1px solid black;
            border-radius: 3px;
            cursor: pointer;
        }
        .option-container {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 5px;
        }
        .feedback {
            display: none;
            margin-top: 10px;
            padding: 5px;
            background: #f3f3f3;
            border-radius: 3px;
        }
        .highlight {
            color: red;
            font-weight: bold;
        }
        .highlighted-output {
            margin-top: 10px;
            padding: 5px;
            border: 1px solid #ccc;
            border-radius: 3px;
            background: #f9f9f9;
            min-height: 30px;
            display: none; /* Hide initially */
        }

        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Interaction Metrics Survey Bias Checker</h1>
        <label for="surveyInput">Paste Your Survey Question Here:</label>
        <textarea id="surveyInput" placeholder="Paste your survey question..."></textarea>
        <div id="surveyInputDisplay" class="highlighted-output"></div>
    </div>
    
    <div class="card">
        <label for="answerType">Pick the response type you plan to use. If Multiple Choice or Likert, enter just one response option per field.</label>
        <select id="answerType">
            <option value="NPS" selected>Net Promoter Score (NPS)</option>
            <option value="multiple choice">Multiple Choice</option>
            <option value="likert scale">Likert Scale</option>
            <option value="numerical rating scale">Numerical Rating Scale</option>
            <option value="open-ended">Open-Ended</option>
        </select>
    </div>
    
    <div class="card" id="answerSection" style="display: none;">
        <div id="answerOptions"></div>
        <button class="button" onclick="addAnswerChoice()">Add Response Option</button>
    </div>
    
    <div class="card">
        <button class="button" onclick="checkBias()">Check for Bias</button>
        <div id="questionFeedback" class="feedback"></div>
        <div id="answerFeedback" class="feedback"></div>
    </div>

<script>
    document.getElementById("answerType").addEventListener("change", function() {
    const type = this.value;
    const answerSection = document.getElementById("answerSection");
    answerSection.style.display = (type === "multiple choice" || type === "likert scale") ? "block" : "none";
    document.getElementById("answerOptions").innerHTML = "";
});

function addAnswerChoice() {
    let optionContainer = document.createElement("div");
    optionContainer.className = "option-container fade-in";
    
    let removeButton = document.createElement("button");
    removeButton.textContent = "-";
    removeButton.className = "remove-option";
    removeButton.onclick = function() {
        optionContainer.remove();
    };
    
    let input = document.createElement("input");
    input.type = "text";
    input.placeholder = "Enter response option...";
    
    optionContainer.appendChild(removeButton);
    optionContainer.appendChild(input);
    document.getElementById("answerOptions").appendChild(optionContainer);
}

function checkBias() {
    const input = document.getElementById("surveyInput").value.toLowerCase();
    let questionBias = "";
    let answerBias = "";

    function highlightWords(text, words) {
        let pattern = new RegExp("\\b(" + words.join("|") + ")\\b", "gi");
        return text.replace(pattern, '<span class="highlight">$1</span>');
    }

    let highlightedText = input; // Declare once

    // 🚨 FIXED: Combined all bias checks into one function
    const biasWords = {
        "🚨 Leading Question: Avoid suggesting an answer.": [
             "agree", "disagree", "isn't it true", "efficient", "efficiently",
        "effective", "effectively", "great", "satisfactory", "satisfied", "amazing",
        "perfect", "perfectly", "enjoy", "enjoyed", "exceptional", "exceptionally",
        "beneficial", "impressively", "impressive", "impressed", "love", "loved",
        "why do you like", "happy", "happily", "pleased",
        "delighted", "helpful", "helpfully", "easy", "easily", "convenient",
        "conveniently", "excellent", "excellently", "successful", "successfully",
        "confusing", "confusingly", "poor", "poorly", "disappointing", "disappointingly",
        "unhelpful", "unhelpfully", "slow", "slowly", "rude", "rudely",
        "unprofessional", "unprofessionally", "timely", "better", "worse"
        ],
        "🚨 Double-Barreled Question: Keep it focused on one topic.": [
            "and.*or", "both", "together", "at the same time", "combined", "simultaneously", "as well as", "in addition to", "along with", "and also"
        ],
        "🚨 Forced Question: Ensure respondents have a way to opt out.": [
            "must", "required"
        ],
        "🚨 Jargon Detected: Use simple and clear language.": [
            "CRM", "UX", "Efficacy", "churn", "pain point", "stakeholder", "onboarding", "offboarding" 
        ]
    };

    for (let warning in biasWords) {
        let pattern = new RegExp("\\b(" + biasWords[warning].join("|") + ")\\b", "gi");
        if (pattern.test(input)) {
            questionBias = warning;
            highlightedText = highlightWords(highlightedText, biasWords[warning]);
        }
    }

    // ✅ Show highlighted text correctly
    document.getElementById("surveyInputDisplay").innerHTML = highlightedText;
    document.getElementById("surveyInputDisplay").style.display = "block";

    // 🚨 FIXED: Answer bias checks **only if there are answer choices**
    const answerOptions = document.querySelectorAll("#answerOptions input");

if (answerOptions.length > 0) {
    const optionValues = Array.from(answerOptions).map(o => o.value.trim().toLowerCase()).filter(Boolean);
    let answerBias = "";

    // ─── CLUSTER MAP (vague / near-synonym detection) ───────────────────
    const clusters = [
        ["exceeded expectations","above expectations","surpassed expectations","beyond expectations","better than expected"],
        ["met expectations","as expected","what i expected","what was expected"],
        ["below expectations","did not meet expectations","fell short","less than expected","worse than expected"],
        ["excellent","outstanding","exceptional","superb","fantastic","wonderful","terrific","great"],
        ["good","fine","okay","decent","acceptable","adequate","satisfactory","alright"],
        ["average","moderate","mixed","so-so","mediocre"],
        ["poor","bad","lacking","subpar","below average","disappointing"],
        ["terrible","awful","horrible","dreadful","atrocious","abysmal"],
        ["extremely satisfied","very satisfied","completely satisfied","absolutely satisfied","totally satisfied","highly satisfied"],
        ["somewhat satisfied","fairly satisfied","mostly satisfied","quite satisfied","generally satisfied","relatively satisfied","a little satisfied","slightly satisfied"],
        ["somewhat dissatisfied","fairly dissatisfied","mostly dissatisfied","quite dissatisfied","generally dissatisfied","relatively dissatisfied","a little dissatisfied","slightly dissatisfied"],
        ["extremely dissatisfied","very dissatisfied","completely dissatisfied","absolutely dissatisfied","totally dissatisfied","highly dissatisfied"],
        ["strongly agree","completely agree","absolutely agree","totally agree","fully agree","wholeheartedly agree"],
        ["somewhat agree","fairly agree","mostly agree","generally agree","tend to agree","slightly agree","a little agree"],
        ["somewhat disagree","fairly disagree","mostly disagree","generally disagree","tend to disagree","slightly disagree","a little disagree"],
        ["strongly disagree","completely disagree","absolutely disagree","totally disagree","fully disagree","wholeheartedly disagree"],
        ["extremely likely","very likely","highly likely","almost certainly","definitely will"],
        ["somewhat likely","fairly likely","probably","might","possibly"],
        ["somewhat unlikely","fairly unlikely","probably not","might not"],
        ["extremely unlikely","very unlikely","highly unlikely","almost certainly not","definitely will not","definitely won't"]
    ];

    for (let cluster of clusters) {
        const hits = optionValues.filter(v => cluster.includes(v));
        if (hits.length >= 2) {
            answerBias = "⚠️ Vague Answer Choices: Two or more options are too similar for respondents to distinguish reliably.";
            break;
        }
    }

    // ─── POSITIVE / NEGATIVE / NEUTRAL CLASSIFICATION ───────────────────
    const positiveWords = ["satisfied","pleased","happy","delighted","content","agree","support","likely","probable",
        "helpful","effective","efficient","easy","clear","responsive","reliable","accurate",
        "professional","friendly","smooth","seamless","valuable","fair","reasonable","timely",
        "prompt","excellent","outstanding","exceptional","good","great","satisfied","successful",
        "enjoy","recommend","trust","convenient","easy","impressive"];
    const negativeWords = ["dissatisfied","displeased","unhappy","disappointed","disagree","oppose","unlikely","improbable",
        "unhelpful","ineffective","inefficient","difficult","unclear","unresponsive","unreliable",
        "inaccurate","unprofessional","unfriendly","frustrating","confusing","poor","bad",
        "terrible","awful","horrible","avoid","distrust","slow","rude","unsuccessful"];
    const neutralWords = ["neutral","neither","unsure","no opinion","not sure","undecided","no preference","mixed","average","moderate","middle"];
    const optOutWords = ["n/a","not applicable","none","does not apply","not relevant","other","none of the above","prefer not to answer","not sure"];

    function classify(val) {
        if (neutralWords.some(w => val.includes(w))) return "neutral";
        if (optOutWords.some(w => val.includes(w))) return "optout";
        const posScore = positiveWords.filter(w => val.includes(w)).length;
        const negScore = negativeWords.filter(w => val.includes(w)).length;
        if (posScore > negScore) return "positive";
        if (negScore > posScore) return "negative";
        return "neutral";
    }

    const classified = optionValues.map(classify);
    document.getElementById("answerFeedback").innerHTML = 
    optionValues.map((v,i) => v + " → " + classified[i]).join("<br>");
document.getElementById("answerFeedback").style.display = "block";
    const posCount = classified.filter(c => c === "positive").length;
    const negCount = classified.filter(c => c === "negative").length;
    const hasNeutral = classified.includes("neutral");
    const hasOptOut = classified.includes("optout");

    // ─── UNBALANCED CHECK ────────────────────────────────────────────────
    if (!answerBias && (posCount > 0 || negCount > 0)) {
        if (Math.abs(posCount - negCount) > 1) {
            answerBias = "⚠️ Unbalanced Answer Choices: The number of positive and negative options should be roughly equal.";
        }
    }

    // ─── NON-PARALLEL CHECK ──────────────────────────────────────────────
    const modifierLevels = [
        { level: 3, words: ["extremely","completely","absolutely","entirely","totally","exceptionally","incredibly"] },
        { level: 2, words: ["very","highly","greatly"] },
        { level: 1, words: ["somewhat","slightly","fairly","a little","a bit","moderately","kind of","sort of"] }
    ];

    function getModifierLevel(val) {
        for (let m of modifierLevels) {
            if (m.words.some(w => val.startsWith(w + " "))) return m.level;
        }
        return 0;
    }

    if (!answerBias && posCount > 0 && negCount > 0) {
        const posLevels = optionValues.filter((_,i) => classified[i] === "positive").map(getModifierLevel).sort();
        const negLevels = optionValues.filter((_,i) => classified[i] === "negative").map(getModifierLevel).sort();
        const posSet = JSON.stringify(posLevels);
        const negSet = JSON.stringify(negLevels);
        if (posSet !== negSet) {
            answerBias = "⚠️ Non-Parallel Scale: Positive and negative options should use matching intensity levels (e.g. 'very satisfied' needs a matching 'very dissatisfied').";
        }
    }

    // ─── LIMITED OPTIONS / MISSING OPT-OUT ──────────────────────────────
    if (!answerBias && !hasOptOut) {
        answerBias = "⚠️ Limited Answer Options: Include an opt-out such as 'N/A', 'Other', or 'None of the above' so respondents aren't forced into an answer that doesn't apply.";
    }

    // ─── FORCED QUESTION WITHOUT OPT-OUT ────────────────────────────────
    const questionText = document.getElementById("surveyInput").value.toLowerCase();
    const forcedTerms = ["must","required","have to","need to","mandatory","obligatory","compulsory"];
    const isForcedQuestion = forcedTerms.some(t => new RegExp("\\b" + t + "\\b").test(questionText));
    if (!answerBias && isForcedQuestion && !hasOptOut) {
        answerBias = "⚠️ Forced Question: This question uses mandatory language but no opt-out option is provided. Add 'N/A' or 'Does not apply.'";
    }

    // ─── DISPLAY ─────────────────────────────────────────────────────────
    document.getElementById("answerFeedback").innerHTML = answerBias || "✅ No bias detected in the answer choices!";
    document.getElementById("answerFeedback").style.display = "block";
}

    // ✅ FIXED: Display feedback properly
    document.querySelectorAll(".feedback").forEach(el => el.style.display = "none");
    document.getElementById("questionFeedback").innerHTML = questionBias || "✅ No bias detected in the question wording!";
    document.getElementById("questionFeedback").style.display = "block";

    if (answerOptions.length > 0) {
        document.getElementById("answerFeedback").innerHTML = answerBias || "✅ No bias detected in the answer choices!";
        document.getElementById("answerFeedback").style.display = "block";
    }
}

</script>    
</body>
</html>
